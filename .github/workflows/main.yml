name: Build Custom LuCI APK (v25.12.0+)

on:
  workflow_dispatch: # 支持在 GitHub Actions 页面手动点击触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取当前仓库的插件源码
        uses: actions/checkout@v4
        with:
          path: luci-app-adguardhome

      - name: 2. 安装 Linux 编译依赖环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget zstd

      - name: 3. 下载并解压 25.12.0 专属 SDK
        run: |
          # 【特别注意】这里默认以官方标准的 x86_64 (软路由) 架构 25.12.0 SDK 为例
          # 如果你的路由器是其他芯片架构（如联发科 Filogic 等），请更换对应的 SDK 下载链接
          SDK_URL="https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          
          wget $SDK_URL -O sdk.tar.zst
          mkdir sdk
          tar -I zstd -xf sdk.tar.zst -C sdk --strip-components=1

      - name: 4. 将插件源码移动到 SDK 的 package 目录
        run: |
          mv luci-app-adguardhome sdk/package/

      - name: 5. 更新并安装 SDK 核心依赖 feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 6. 现场执行编译
        run: |
          cd sdk
          # 构建系统会自动识别 25.12 环境并编译输出 APK 包
          make package/luci-app-adguardhome/compile V=s

      - name: 7. 收集并打包生成的 .apk 文件
        run: |
          mkdir -p artifact
          # 核心修改：25.12 后缀全部变更为 *.apk 
          find sdk/bin/packages/ -name "*.apk" -exec cp {} artifact/ \;

      - name: 8. 上传到 GitHub Artifacts 供下载
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-adguardhome-apk-packages
          path: artifact/
